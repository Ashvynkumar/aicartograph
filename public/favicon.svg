<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#62acbb" />
      <stop offset="100%" style="stop-color:#85c4d0" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#85c4d0" />
      <stop offset="100%" style="stop-color:#aedbe4" />
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="100" height="100" rx="18" fill="#040a0d"/>

  <!-- Subtle glow behind center -->
  <circle cx="52" cy="50" r="30" fill="rgba(69,151,176,0.08)"/>

  <!-- Source nodes - brighter -->
  <circle cx="14" cy="18" r="5" fill="#aedbe4" opacity="0.7"/>
  <circle cx="26" cy="10" r="4.5" fill="#85c4d0" opacity="0.65"/>
  <circle cx="11" cy="42" r="4" fill="#62acbb" opacity="0.6"/>
  <circle cx="28" cy="34" r="5.5" fill="#aedbe4" opacity="0.7"/>
  <circle cx="16" cy="66" r="4.5" fill="#85c4d0" opacity="0.65"/>
  <circle cx="30" cy="58" r="4" fill="#62acbb" opacity="0.6"/>
  <circle cx="14" cy="84" r="5" fill="#aedbe4" opacity="0.7"/>
  <circle cx="26" cy="90" r="4.5" fill="#85c4d0" opacity="0.65"/>

  <!-- Connection lines - brighter -->
  <path d="M14,18 Q38,34 52,50" stroke="url(#lineGrad)" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M28,34 Q42,40 52,50" stroke="url(#lineGrad)" stroke-width="1.4" fill="none" opacity="0.45"/>
  <path d="M30,58 Q42,54 52,50" stroke="url(#lineGrad)" stroke-width="1.4" fill="none" opacity="0.45"/>
  <path d="M16,66 Q38,60 52,50" stroke="url(#lineGrad)" stroke-width="1.2" fill="none" opacity="0.4"/>
  <path d="M14,84 Q38,68 52,50" stroke="url(#lineGrad)" stroke-width="1.2" fill="none" opacity="0.4"/>

  <!-- Center hub - rings brighter -->
  <circle cx="52" cy="50" r="14" fill="none" stroke="#62acbb" stroke-width="1" opacity="0.4"/>
  <circle cx="52" cy="50" r="9" fill="none" stroke="#85c4d0" stroke-width="1.5" opacity="0.6"/>
  <circle cx="52" cy="50" r="5.5" fill="url(#cGrad)"/>

  <!-- Arrow - brighter -->
  <line x1="62" y1="50" x2="84" y2="50" stroke="#85c4d0" stroke-width="3" stroke-linecap="round"/>
  <polygon points="87,50 79,45 79,55" fill="#85c4d0"/>
</svg>
